<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Legal Check-up PME — Paiement</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f4f6fb; margin: 0; padding: 24px; color: #1a1a1a; }
  .card { max-width: 420px; margin: 40px auto; background: #fff; border-radius: 14px; padding: 28px; box-shadow: 0 4px 18px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; color: #1F3864; margin-bottom: 4px; }
  .price { font-size: 32px; font-weight: 700; color: #1F3864; margin: 12px 0; }
  p.desc { color: #444; line-height: 1.5; }
  label { display: block; margin-top: 16px; font-weight: 600; font-size: 14px; }
  input { width: 100%; padding: 10px 12px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
  button { width: 100%; margin-top: 22px; padding: 14px; background: #1F3864; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  button:disabled { background: #9aa5c2; }
  .error { color: #C00000; margin-top: 12px; font-size: 14px; }
  .note { font-size: 12px; color: #777; margin-top: 18px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Legal Check-up PME</h1>
    <p class="desc">Diagnostic juridique complet de votre entreprise en 15 minutes, avec rapport personnalisé.</p>
    <div class="price">15 000 FCFA</div>

    <label for="name">Nom et prénom</label>
    <input id="name" type="text" placeholder="Votre nom" />

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="vous@exemple.com" />

    <label for="phone">Téléphone (Mobile Money)</label>
    <input id="phone" type="tel" placeholder="+229 XX XX XX XX" />

    <button id="payBtn" onclick="payer()">Payer et accéder au questionnaire</button>
    <div id="err" class="error"></div>
    <p class="note">Paiement sécurisé par Mobile Money ou carte via CinetPay. Vous recevrez le lien du questionnaire par email dès confirmation du paiement.</p>
  </div>

<script>
async function payer() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const err = document.getElementById('err');
  const btn = document.getElementById('payBtn');
  err.textContent = '';

  if (!name || !email || !phone) {
    err.textContent = 'Merci de remplir tous les champs.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Redirection en cours...';

  try {
    const res = await fetch('/pay/init', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Erreur lors de l\'initialisation du paiement');
    window.location.href = data.paymentUrl;
  } catch (e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Payer et accéder au questionnaire';
  }
}
</script>
</body>
</html>
